<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>Offline</title>
<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  margin: 0;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.offline-card {
  max-width: 400px;
  padding: 2rem;
  text-align: center;
}
h1 {
  font-size: 1.5rem;
  color: #f5a623;
  margin: 0 0 1rem;
}
p {
  font-size: 1rem;
  line-height: 1.6;
  color: #b0b0c8;
  margin: 0 0 1.5rem;
}
a {
  display: inline-block;
  padding: 0.75rem 1.5rem;
  background: #f5a623;
  color: #1a1a2e;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="offline-card">
  <h1>You're offline</h1>
  <p>This recipe isn't saved for offline use yet. Connect to the internet to download it, and it'll be available next time even without a connection.</p>
  <a href="./">Back to recipes</a>
</div>
</body>
</html>
